<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
</head>
    <body style="font-family: Arial; text-align:center;">

<h2>Student Performance Prediction</h2>

<form action="/predict" method="post">

    <input type="number" step="any" name="study_hours" placeholder="Study Hours"><br><br>

    <input type="number" step="any" name="attendance" placeholder="Attendance"><br><br>

    <input type="number" step="any" name="previous_marks" placeholder="Previous Marks"><br><br>

    <input type="number" step="any" name="sleep_hours" placeholder="Sleep Hours"><br><br>

    <input type="number" step="any" name="internet_usage" placeholder="Internet Usage"><br><br>

    <button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>

    </body>
</html>
